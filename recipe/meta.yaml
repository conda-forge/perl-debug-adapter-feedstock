{% set version = "2.0.0" %}

package:
  name: perl-debug-adapter
  version: {{ version }}

source:
  url: https://github.com/Nihilus118/perl-debug-adapter/archive/v{{ version }}.tar.gz
  sha256: 5498d21ce9dbc8b83975b042491191d0193732a1e47d351aa86ca989a0b85511

build:
  noarch: generic
  number: 0

requirements:
  host:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

test:
  commands:
    - perl-debug-adapter &
    - exe_pid=$!
    - trap "kill -SIGTERM ${exe_pid}" SIGTERM

about:
  home: https://github.com/Nihilus118/perl-debug-adapter
  license: MIT
  license_file:
    - LICENSE.md
    - third-party-licenses.txt
  summary: Debug adapter for Perl
  dev_url: https://github.com/Nihilus118/perl-debug-adapter

extra:
  recipe-maintainers:
    - danielnachun
